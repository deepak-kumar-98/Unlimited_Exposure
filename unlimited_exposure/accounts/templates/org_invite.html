<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Organization Invitation</title>
</head>
<body>
    <p>Hi {{ username }},</p>

    <p>You've been invited by <strong>{{ invited_by }}</strong> to join <strong>{{ organization_name }}</strong> as a <strong>{{ organization_role }}</strong>.</p>

    <p>
        <a href="{{ url_link }}">Accept Invitation</a>
    </p>

    <p>If you did not expect this invitation, please ignore this email.</p>
</body>
</html>
