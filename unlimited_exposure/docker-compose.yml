services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres-exposure_chatbot
    restart: unless-stopped
    hostname: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - internal
    env_file:
      - .env

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-exposure_chatbot
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${PGADMIN_DEFAULT_PORT}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    networks:
      - internal
    env_file:
      - .env

  backend:
    build: .
    container_name: exposure-backend
    restart: unless-stopped
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      gunicorn unlimited_exposure.wsgi:application --bind 0.0.0.0:8000
      "
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - .env
    networks:
      - internal


volumes:
  db_data:

networks:
  internal:
    driver: bridge
