services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres-exposure_chatbot
    restart: always
    hostname: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"   # host:container  (only for external tools like DBeaver)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: pgadmin-exposure_chatbot
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   ports:
  #     - "${PGADMIN_DEFAULT_PORT}:80"
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin
  #   networks:
  #     - internal

  backend:
    build: .
    container_name: exposure-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_PORT=5432
      - POSTGRES_HOST=postgres
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: sh -c "python manage.py collectstatic --noinput && python manage.py migrate --noinput && gunicorn unlimited_exposure.wsgi:application --bind 0.0.0.0:8000"
    networks:
      - internal


volumes:
  db_data:
  pgadmin_data:
  static_volume:
  media_volume:

networks:
  internal:
    driver: bridge